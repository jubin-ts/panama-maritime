<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMTS Authentic Certificate</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="cert-view-page">

    <!-- Full-page PMTS seal watermark -->
    <div class="cert-bg-watermark">
      <img src="WhatsApp%20Image%202026-05-06%20at%2012.45.56.jpeg" alt="">
    </div>

    <!-- Branding row -->
    <div class="verify-header">
      <img src="WhatsApp%20Image%202026-05-06%20at%2012.45.56.jpeg" alt="PMTS Logo">
      <div class="verify-header-text">
        <h2>Panama Maritime Training Services</h2>
        <p>Certificate Verification System</p>
      </div>
    </div>

    <!-- Certificate card (populated by JS) -->
    <div id="cert-card-container"></div>

    <!-- Action buttons (populated by JS) -->
    <div class="cert-print-bar" id="cert-print-bar" style="display:none;">
      <button class="btn btn-secondary" onclick="window.print()">🖨 Print</button>
      <a href="index.html" class="btn btn-outline">← Home</a>
    </div>

  </div>

  <script src="js/app.js"></script>
  <script src="js/details.js"></script>
</body>
</html>
