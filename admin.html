<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel – PMTS Certificate System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Fixed low-opacity background -->
  <div class="bg-wrapper">
    <img src="WhatsApp%20Image%202026-05-06%20at%2012.46.06.jpeg" alt="">
  </div>

  <div class="page-wrapper">

    <!-- Header -->
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="header-brand">
          <img src="WhatsApp%20Image%202026-05-06%20at%2012.45.56.jpeg"
               alt="PMTS Logo" class="header-logo">
          <div class="header-titles">
            <h1>Panama Maritime Training Services</h1>
            <p>Official Certificate Verification System</p>
          </div>
        </a>
        <nav class="site-nav">
          <a href="index.html" class="nav-link">Home</a>
          <a href="admin.html" class="nav-link active">Admin Panel</a>
        </nav>
      </div>
    </header>

    <!-- Page title bar -->
    <div class="page-title-bar">
      <h2>📋 Admin Panel</h2>
      <p>Manage PMTS certificates and generate QR codes</p>
    </div>

    <main>
      <div class="admin-section">
        <div class="container">

          <!-- Notification -->
          <div id="notification" class="alert" style="display:none;"></div>

          <!-- ── Certificate Form ── -->
          <div class="form-card">
            <div class="form-card-title">
              <span>📝</span>
              <span id="form-title">New Certificate</span>
            </div>

            <form id="cert-form" novalidate>
              <input type="hidden" id="cert-id">

              <div class="form-grid">

                <div class="form-group">
                  <label for="participant-name">Participant's Name *</label>
                  <input type="text" id="participant-name" class="form-control"
                         placeholder="e.g. JOHN SMITH" required>
                </div>

                <div class="form-group">
                  <label for="passport-id">Participant's Passport / ID *</label>
                  <input type="text" id="passport-id" class="form-control"
                         placeholder="e.g. A1234567" required>
                </div>

                <div class="form-group">
                  <label for="course-name">Course Name *</label>
                  <input type="text" id="course-name" class="form-control"
                         placeholder="e.g. Basic Safety Training" required>
                </div>

                <div class="form-group">
                  <label for="course-code">Course Code</label>
                  <input type="text" id="course-code" class="form-control"
                         placeholder="e.g. BST" maxlength="10">
                </div>

                <div class="form-group">
                  <label for="register-code">Register Code</label>
                  <div class="input-row">
                    <input type="text" id="register-code" class="form-control"
                           placeholder="Auto-generated or enter manually">
                    <button type="button" class="btn btn-secondary btn-sm"
                            id="btn-gen-code">Generate</button>
                  </div>
                </div>

                <div class="form-group">
                  <label for="issue-date">Certificate Date of Issuance *</label>
                  <input type="date" id="issue-date" class="form-control" required>
                </div>

                <div class="form-group">
                  <label for="expiry-date">Expiry Date</label>
                  <input type="date" id="expiry-date" class="form-control">
                </div>

                <div class="form-group">
                  <label for="cert-type">Certificate Type</label>
                  <select id="cert-type" class="form-control">
                    <option value="">— Select Type —</option>
                    <option>STCW Certificate</option>
                    <option>Proficiency Certificate</option>
                    <option>Training Certificate</option>
                    <option>Endorsement Certificate</option>
                    <option>Medical Certificate</option>
                    <option>Competency Certificate</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="nationality">Nationality</label>
                  <input type="text" id="nationality" class="form-control"
                         placeholder="e.g. Filipino">
                </div>

                <div class="form-group">
                  <label for="issuing-officer">Issuing Officer</label>
                  <input type="text" id="issuing-officer" class="form-control"
                         placeholder="Name of issuing officer">
                </div>

              </div><!-- /.form-grid -->

              <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                  💾 Save &amp; Generate QR
                </button>
                <button type="button" class="btn btn-secondary" id="btn-clear">
                  ✕ Clear Form
                </button>
              </div>

            </form>
          </div><!-- /.form-card -->

          <!-- ── Saved Certificates List ── -->
          <div class="certs-list-card">
            <div class="form-card-title">
              <span>📄</span>
              <span>Saved Certificates</span>
              <span id="cert-count"
                    style="margin-left:auto;font-size:.82rem;font-weight:400;color:var(--text-light)"></span>
            </div>
            <div id="certs-container"><!-- populated by JS --></div>
          </div>

        </div><!-- /.container -->
      </div><!-- /.admin-section -->
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 Panama Maritime Training Services. All rights reserved.</p>
    </footer>

  </div><!-- /.page-wrapper -->

  <!-- ── QR Code Modal ── -->
  <div class="modal-overlay" id="qr-modal">
    <div class="modal">
      <h3>🔳 Certificate QR Code</h3>
      <p class="modal-sub" id="qr-modal-name"></p>
      <div id="qr-container"></div>
      <div class="modal-url" id="qr-url-display"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-download-qr">⬇ Download PNG</button>
        <button class="btn btn-secondary" id="btn-view-cert">🔍 View Certificate</button>
        <button class="btn btn-outline" id="btn-close-modal">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
          integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4fn5L1La6RTpgxc7Ze/KQ=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
